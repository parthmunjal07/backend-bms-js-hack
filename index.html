<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BMS Mini Backend</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");
      body {
        font-family: "Outfit", sans-serif;
        background-color: #000000;
        color: #ffffff;
      }
    </style>
  </head>
  <body class="min-h-screen flex items-center justify-center p-6 bg-black">
    <div class="max-w-7xl w-full bg-black rounded-3xl p-10 border border-zinc-800">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-white mb-4 tracking-tight">
          Parth's Cinema - Now Showing<br />
          <br />
          <span class="text-zinc-400">
            <span id="displayMovieTitle" class="font-bold text-white">Dhurandhar The Revenge</span>
          </span>
        </h1>
      </div>

      <div class="flex justify-center mb-10 gap-4" id="movieToggleContainer">
        <button class="movie-btn px-6 py-2 rounded-full border border-white bg-white text-black font-semibold transition-all" data-movie-id="1" data-title="Dhurandhar The Revenge">Movie 1</button>
        <button class="movie-btn px-6 py-2 rounded-full border border-zinc-800 bg-black text-zinc-500 hover:border-zinc-600 hover:text-white transition-all" data-movie-id="2" data-title="The Matrix: Reborn">Movie 2</button>
      </div>

      <div class="flex justify-center mb-10">
        <div class="bg-zinc-950 rounded-full px-6 py-3 border border-zinc-800 flex gap-8 items-center">
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-black border border-white"></div>
            <span class="text-zinc-300 font-medium tracking-wide">Available</span>
          </div>
          <div class="w-px h-6 bg-zinc-800"></div>
          <div class="flex items-center gap-3">
            <div class="w-4 h-4 rounded-full bg-zinc-900 border border-zinc-800"></div>
            <span class="text-zinc-500 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex flex-col items-center justify-center w-full">
        <div class="w-full max-w-2xl mx-auto mb-16 relative">
          <div class="h-12 bg-gradient-to-t from-zinc-900/40 to-transparent rounded-t-[50%] border-t-4 border-white shadow-[0_-15px_40px_rgba(255,255,255,0.15)] flex items-end justify-center pb-2">
            <span class="text-zinc-500 text-xs font-bold tracking-[0.4em] uppercase">Screen</span>
          </div>
        </div>

        <div class="p-8 rounded-2xl">
          <table id="tbl" class="border-separate border-spacing-4 mx-auto"></table>
        </div>
      </div>
    </div>

    <script>
      const token = localStorage.getItem('authToken');
      if (!token) {
          window.location.href = '/auth';
      }

      let currentMovieId = 1;

      // Handle Movie Toggling
      document.querySelectorAll('.movie-btn').forEach(btn => {
          btn.addEventListener('click', (e) => {
              // Update active button styling
              document.querySelectorAll('.movie-btn').forEach(b => {
                  b.className = 'movie-btn px-6 py-2 rounded-full border border-zinc-800 bg-black text-zinc-500 hover:border-zinc-600 hover:text-white transition-all';
              });
              e.target.className = 'movie-btn px-6 py-2 rounded-full border border-white bg-white text-black font-semibold transition-all';
              
              // Update state and UI
              currentMovieId = e.target.getAttribute('data-movie-id');
              document.getElementById('displayMovieTitle').textContent = e.target.getAttribute('data-title');
              
              // Re-fetch seats for the new movie
              run();
          });
      });

      async function run() {
        const tbl = document.getElementById("tbl");
        tbl.innerHTML = ''; // Clear existing seats

        try {
            // Notice we are now passing the movieId to the backend!
            const res = await fetch(`/seats?movieId=${currentMovieId}`);
            const responseData = await res.json();
            
            if(!responseData.data) {
                tbl.innerHTML = `<tr><td class="text-zinc-500">Backend not yet configured for Movie ${currentMovieId}</td></tr>`;
                return;
            }

            const j = responseData.data.sort((a, b) => a.id - b.id);
            let tr;
            for (let i = 0; i < j.length; i++) {
            if (i % 8 === 0) tr = document.createElement("tr");

            const td = document.createElement("td");
            const baseClasses = "w-32 h-32 rounded-2xl text-center align-middle text-2xl font-bold transition-all duration-300 select-none relative group";

            if (j[i].isbooked) {
            td.className = `${baseClasses} bg-zinc-900 text-zinc-600 border border-zinc-800 cursor-not-allowed`;
            td.innerHTML = `
                    <span class="relative z-10">${i + 1}</span>
                    <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-3 px-4 py-2 bg-black border border-zinc-800 text-sm text-white rounded-xl opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 whitespace-nowrap shadow-2xl z-50 pointer-events-none font-normal">
                        Booked by: <span class="font-bold text-white ml-1">${j[i].name}</span>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[1px] border-[6px] border-transparent border-t-zinc-800"></div>
                        <div class="absolute top-full left-1/2 -translate-x-1/2 -mt-[2px] border-[5px] border-transparent border-t-black"></div>
                    </div>
                `;
          } else {
            td.className = `${baseClasses} bg-black text-white border border-zinc-600 cursor-pointer hover:border-white hover:bg-zinc-900 active:scale-95`;
            // And changed this to ${i + 1}
            td.innerHTML = `<span class="relative z-10">${i + 1}</span>`;
          }

            td.addEventListener("click", async function (e) {
                if (e.currentTarget.classList.contains("cursor-not-allowed")) return; 

                const token = localStorage.getItem('authToken');
                if (!token) {
                    alert("You must be logged in to book a seat!");
                    window.location.href = '/auth';
                    return;
                }

                // We now pass the movieId in the body so the backend knows WHICH movie's seat to lock
                const res = await fetch(`/${j[i].id}`, { 
                    method: "PUT",
                    headers: { 
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ movieId: currentMovieId })
                });
                
                const data = await res.json();

                if (!data.success) {
                    alert("FAILED! " + (data.message || "Couldn't book! already booked."));
                } else {
                    run(); // Re-render the grid to show the updated state
                }
            });
            tr.appendChild(td);
            tbl.appendChild(tr);
            }
        } catch (err) {
            console.error(err);
        }
      }
      run();
    </script>
  </body>
</html>
