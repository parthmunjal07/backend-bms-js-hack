<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
        }
        .tab-content { 
            display: none; 
        }
        .tab-content.active { 
            display: block; 
            animation: fadeIn 0.4s ease-out; 
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            700: '#3f3f46',
                            800: '#27272a',
                            900: '#18181b',
                            950: '#09090b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="min-h-screen bg-black text-zinc-300 flex items-center justify-center p-4">

    <div class="w-full max-w-md bg-black border border-zinc-800 rounded-2xl shadow-2xl p-8 relative overflow-hidden">
        
        <div class="text-center mb-8 relative z-10">
            <h1 class="text-3xl font-bold text-white mb-2" id="formTitle">Welcome Back</h1>
            <p class="text-zinc-500 text-sm" id="formSubtitle">Sign in to access your account</p>
        </div>

        <div id="messageBox" class="hidden rounded-lg p-3 mb-6 text-center text-sm font-medium border transition-colors duration-300 z-10 relative"></div>

        <div class="flex mb-8 bg-zinc-950 rounded-lg p-1 relative z-10 border border-zinc-800">
            <button type="button" onclick="switchTab('login')" id="tabLogin" class="flex-1 py-2 text-sm font-semibold rounded-md bg-zinc-900 border border-zinc-800 text-white shadow-sm transition-all duration-300">Login</button>
            <button type="button" onclick="switchTab('register')" id="tabRegister" class="flex-1 py-2 text-sm font-semibold rounded-md text-zinc-500 hover:text-white transition-all duration-300 bg-transparent border border-transparent">Register</button>
        </div>

        <form id="loginForm" class="tab-content active relative z-10">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-1" for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" required class="w-full bg-black border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder-zinc-700" placeholder="user@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-1" for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" required class="w-full bg-black border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder-zinc-700" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-white text-black font-bold py-3 mt-4 rounded-lg hover:bg-zinc-200 transition-colors active:scale-[0.98]">Sign In</button>
            </div>
        </form>

        <form id="registerForm" class="tab-content relative z-10">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-1" for="registerName">Full Name</label>
                    <input type="text" id="registerName" required class="w-full bg-black border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder-zinc-700" placeholder="John Doe">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-1" for="registerEmail">Email Address</label>
                    <input type="email" id="registerEmail" required class="w-full bg-black border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder-zinc-700" placeholder="user@example.com">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-1" for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" required class="w-full bg-black border border-zinc-800 text-white rounded-lg px-4 py-3 focus:outline-none focus:border-white transition-colors placeholder-zinc-700" placeholder="••••••••">
                </div>
                <button type="submit" class="w-full bg-white text-black font-bold py-3 mt-4 rounded-lg hover:bg-zinc-200 transition-colors active:scale-[0.98]">Create Account</button>
            </div>
        </form>
    </div>

    <script>
        const API_BASE_URL = '/api/auth';
        
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const tabLogin = document.getElementById('tabLogin');
        const tabRegister = document.getElementById('tabRegister');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const messageBox = document.getElementById('messageBox');

        function switchTab(tab) {
            hideMessage(); 

            if (tab === 'login') {
                loginForm.classList.add('active');
                registerForm.classList.remove('active');
                
                tabLogin.className = 'flex-1 py-2 text-sm font-semibold rounded-md bg-zinc-900 border border-zinc-800 text-white shadow-sm transition-all duration-300';
                tabRegister.className = 'flex-1 py-2 text-sm font-semibold rounded-md text-zinc-500 hover:text-white transition-all duration-300 bg-transparent border border-transparent';
                
                formTitle.textContent = 'Welcome Back';
                formSubtitle.textContent = 'Sign in to access your account';
            } else {
                registerForm.classList.add('active');
                loginForm.classList.remove('active');
                
                tabRegister.className = 'flex-1 py-2 text-sm font-semibold rounded-md bg-zinc-900 border border-zinc-800 text-white shadow-sm transition-all duration-300';
                tabLogin.className = 'flex-1 py-2 text-sm font-semibold rounded-md text-zinc-500 hover:text-white transition-all duration-300 bg-transparent border border-transparent';
                
                formTitle.textContent = 'Create Account';
                formSubtitle.textContent = 'Join us and start your journey';
            }
        }

        function showMessage(msg, isSuccess = false) {
            messageBox.textContent = msg;
            messageBox.classList.remove('hidden');
            
            if (isSuccess) {
                messageBox.className = 'rounded-lg p-3 mb-6 text-center text-sm font-medium border z-10 relative bg-zinc-900 text-white border-zinc-700';
            } else {
                messageBox.className = 'rounded-lg p-3 mb-6 text-center text-sm font-medium border z-10 relative bg-zinc-950 text-white border-zinc-700';
            }
        }

        function hideMessage() {
            messageBox.classList.add('hidden');
            messageBox.textContent = '';
        }

        async function handleAuth(url, payload) {
            try {
                hideMessage();

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await response.json();
                
                if (!response.ok || data.success === false) {
                    throw new Error(data.message || 'Authentication failed. Please try again.');
                }
                
                showMessage(data.message || 'Success! Redirecting...', true);
                
                if (data.data?.token) {
                    localStorage.setItem('authToken', data.data.token);
                }
                if (data.data?.user?.name) {
                    localStorage.setItem('userName', data.data.user.name);
                }
                
                setTimeout(() => {
                    window.location.href = '/';
                }, 1000);
                
            } catch (error) {
                showMessage(error.message, false);
            }
        }

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            handleAuth(`${API_BASE_URL}/login`, { email, password });
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const name = document.getElementById('registerName').value;
            const email = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            
            handleAuth(`${API_BASE_URL}/register`, { name, email, password });
        });
    </script>
</body>
</html>
